<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM Chat</title>
    <link rel="stylesheet" href="../Styles/home2.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

   <!-- Barre de navigation -->
<nav class="navbar navbar-dark bg-transparent">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="../Assets/IM-logo.png" alt="IM Logo" id="logo">
        </a>
        <div class="d-flex">
            <button id="register-btn" class="btn btn-light">Start now</button>
        </div>
    </div>
</nav>

    <!-- Vidéo de fond -->
<div id="video-container">
    <video autoplay muted loop id="background-video">
        <source src="../Assets/im-motion-logo.mp4" type="video/mp4">
        Votre navigateur ne supporte pas la balise vidéo.
    </video>
</div>

<div id="form-container" class="form-container">
    <form id="register-form">
        <h2>Enter a name</h2>
        <label for="name"> Name :</label>
        <input type="text" id="name" required>
        <button class="button-27" role="button" type="submit">C H A T</button>
    </form>
</div>

<script src="./script.js"></script>
</body>
</html>
