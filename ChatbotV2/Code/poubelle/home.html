    <title>IM Chat</title>
    <link rel="stylesheet" href="../Styles/home.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

   <!-- Barre de navigation -->
<nav class="navbar navbar-dark bg-transparent">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="../Assets/IM-logo.png" alt="IM Logo" id="logo">
        </a>
        <div class="d-flex">
            <button id="login-btn" class="btn btn-outline-light me-2">Login</button>
            <button id="register-btn" class="btn btn-light">Register</button>
        </div>
    </div>
</nav>


    <!-- Vidéo de fond -->
<div id="video-container">
    <video autoplay muted loop id="background-video">
        <source src="../Assets/im-motion-logo.mp4" type="video/mp4">
        Votre navigateur ne supporte pas la balise vidéo.
    </video>
</div>

    <!-- Formulaire caché -->
     <!-- LOGIN -->
<div id="form-container">
    <form id="login-form">
        <h2>L O G I N</h2>
        <label for="email">Email :</label>
        <input type="email" id="email" required>
        
        <label for="password">password :</label>
        <input type="password" id="password" required>

        <div class="options">
            <div class="option">
            <label> <input type="checkbox" id="remember-me"> Remember Me </label>
            </div>
            <a href="#" id="forgot-password">Forgot Password?</a>
        </div>
        
        <button class="button-27" role="button" type="submit">Login</button>
        <p>Don't have an Account? <a href="#" id="show-register">Register</a></p>
    </form>

    <!-- REGISTRATION -->
    <form id="register-form">
        <h2>Registration</h2>
        <label for="new-email">Email :</label>
        <input type="email" id="new-email" required>

        <label for="username">Username :</label>
        <input type="text" id="username" required>
        
        <label for="new-password">Password :</label>
        <input type="password" id="new-password" required>
        
        <button class="button-27" role="button" type="submit">Register</button>

        <p>Already have an account? <a href="#" id="show-login">Login</a></p>
    </form>
</div>


    <script src="./home.js"></script>
</body>
</html>
