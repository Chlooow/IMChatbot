<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM Chat : Dashboard</title>
    <link rel="stylesheet" href="../Styles/chat.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<button id="logout-btn">log out</button>

    <div class="chat-container">
        <header>
            <div class="profile">
                <img src="../Assets/im-tats.jpeg" alt="Profile Picture">
                <div class="online-status"></div>
            </div>
            <img src="../Assets/im-logo.png" alt="IM Logo" class="icon2">
            <img src="../Assets/settings-white.png" alt="Settings" class="icon">
        </header>

        <div id="chat-box">
            
        </div>

        <div id="message-input">
            <img src="../Assets/happy-white.png" class="emoji">
            <input type="text" id="chat-input" placeholder="Type your message here...">
            <img id="send-btn" src="../Assets/send-white.png">
        </div>
    </div>

    <script src="chat.js"></script>

</body>
    </html>
